name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Block secrets in staged files
        run: npm run check-secrets

      - name: Start server
        run: npm start &
        env:
          PORT: 3000
          NODE_ENV: test

      - name: Wait for server
        run: npx --yes wait-on@8 http://127.0.0.1:3000/api/health --timeout 30000

      - name: Smoke tests
        run: npm test
        env:
          PORT: 3000
